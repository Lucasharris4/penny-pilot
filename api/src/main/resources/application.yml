spring:
  application:
    name: penny-pilot-api

  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/pennypilot.db}
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  auth:
    password-min-length: 8
    jwt-secret: ${JWT_SECRET:penny-pilot-default-dev-secret-key-change-me}
    jwt-expiration-ms: 86400000  # 24 hours

  categories:
    seed-on-registration: true
    defaults:
      - name: Groceries
        icon: "\uD83D\uDED2"
        color: "#4CAF50"
        is-subscription: false
      - name: Dining
        icon: "\uD83C\uDF7D\uFE0F"
        color: "#FF9800"
        is-subscription: false
      - name: Transportation
        icon: "\uD83D\uDE97"
        color: "#2196F3"
        is-subscription: false
      - name: Entertainment
        icon: "\uD83C\uDFAC"
        color: "#9C27B0"
        is-subscription: false
      - name: Subscriptions
        icon: "\uD83D\uDD04"
        color: "#607D8B"
        is-subscription: true
      - name: Shopping
        icon: "\uD83D\uDECD\uFE0F"
        color: "#E91E63"
        is-subscription: false
      - name: Bills
        icon: "\uD83D\uDCC4"
        color: "#795548"
        is-subscription: false
      - name: Income
        icon: "\uD83D\uDCB0"
        color: "#4CAF50"
        is-subscription: false
      - name: Other
        icon: "\uD83D\uDCE6"
        color: "#9E9E9E"
        is-subscription: false

management:
  endpoints:
    web:
      exposure:
        include: health
