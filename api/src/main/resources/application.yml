spring:
  application:
    name: penny-pilot-api

  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/pennypilot.db}
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  auth:
    password-min-length: 8
    jwt-secret: ${JWT_SECRET:penny-pilot-default-dev-secret-key-change-me}
    jwt-expiration-ms: 86400000  # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health
